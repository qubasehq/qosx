set timeout=5
set default=0

serial --unit=0 --speed=115200
terminal_input  serial console
terminal_output serial console

menuentry "QOSX" {
  linux  /boot/vmlinuz-6.6.30 root=/dev/vda3 rw quiet loglevel=3 console=tty1 console=ttyS0,115200
  initrd /boot/initrd.img-6.6.30
}

menuentry "QOSX (verbose)" {
  linux  /boot/vmlinuz-6.6.30 root=/dev/vda3 rw console=tty1 console=ttyS0,115200
  initrd /boot/initrd.img-6.6.30
}

menuentry "QOSX (recovery)" {
  linux  /boot/vmlinuz-6.6.30 root=/dev/vda3 rw single console=tty1 console=ttyS0,115200
  initrd /boot/initrd.img-6.6.30
}
