set timeout=3
set default=0

serial --unit=0 --speed=115200
terminal_input  serial console
terminal_output serial console

menuentry "QOSX" {
  linux  /boot/vmlinuz root=/dev/vda3 rw quiet splash loglevel=3 console=ttyS0,115200
  initrd /boot/initrd.img
}

menuentry "QOSX (verbose)" {
  linux  /boot/vmlinuz root=/dev/vda3 rw console=ttyS0,115200
  initrd /boot/initrd.img
}

menuentry "QOSX (recovery)" {
  linux  /boot/vmlinuz root=/dev/vda3 rw single console=ttyS0,115200
  initrd /boot/initrd.img
}
